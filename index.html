<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LexScope — Legislation, Decoded</title>
  <meta name="description" content="Interactive legislation explorer. Paste any bill or legal text and get an AI-parsed breakdown with sections, definitions, cross-references, and plain-English summaries.">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/document.css">
  <link rel="stylesheet" href="css/sidebar.css">
</head>
<body>
  <div id="app">

    <!-- ===== Input View ===== -->
    <div class="view input-view active">
      <div class="input-card">
        <div class="logo">
          <h1>LexScope</h1>
          <p class="tagline">Legislation, Decoded</p>
        </div>

        <div class="input-area">
          <textarea
            id="legislation-input"
            placeholder="Paste any legislation, bill, or legal text here..."
            spellcheck="false"
          ></textarea>
        </div>

        <div class="btn-row">
          <button class="btn btn-primary" id="btn-analyze">Analyze</button>
          <button class="btn btn-secondary" id="btn-load-sample">Load Sample</button>
          <button class="btn btn-secondary" id="btn-compare">Compare Two Versions</button>
        </div>

        <div class="keyboard-hint">
          <kbd>Ctrl</kbd> + <kbd>Enter</kbd> to analyze
        </div>
      </div>
    </div>

    <!-- ===== Document View ===== -->
    <div class="view document-view">
      <!-- Mobile hamburger -->
      <button class="hamburger-btn" id="hamburger" style="display:none;" aria-label="Toggle sidebar">&#9776;</button>

      <!-- Mobile sidebar overlay -->
      <div class="sidebar-overlay" id="sidebar-overlay"></div>

      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <!-- Content rendered by renderer.js -->
      </aside>

      <!-- Main content -->
      <main class="main-panel" id="main-panel">
        <!-- Content rendered by renderer.js -->
      </main>

      <!-- Suggestions Panel -->
      <div class="suggestions-overlay" id="suggestions-overlay"></div>
      <div class="suggestions-panel" id="suggestions-panel">
        <div class="suggestions-panel-header">
          <h3>Suggestions</h3>
          <button class="suggestions-close" id="suggestions-close" aria-label="Close suggestions">&times;</button>
        </div>
        <div class="suggestions-body" id="suggestions-body">
          <!-- Content rendered by app.js -->
        </div>
      </div>

      <!-- FABs -->
      <div class="fab-container" style="display:none;">
        <button class="fab fab-new" id="fab-new" title="New Analysis">+</button>
        <button class="fab fab-copy" id="fab-copy" title="Copy Summary">&#128203;</button>
        <button class="fab fab-suggest" id="fab-suggest" title="Suggestions">&#128161;</button>
      </div>
    </div>

    <!-- ===== Compare View ===== -->
    <div class="view compare-view">
      <div class="compare-header">
        <h2>Compare Versions</h2>
        <p>Paste two versions of a bill to see what changed</p>
      </div>

      <div class="compare-panels">
        <div class="compare-panel">
          <label for="compare-old">Version A (Original)</label>
          <textarea id="compare-old" placeholder="Paste the original version here..." spellcheck="false"></textarea>
        </div>
        <div class="compare-panel">
          <label for="compare-new">Version B (Modified)</label>
          <textarea id="compare-new" placeholder="Paste the modified version here..." spellcheck="false"></textarea>
        </div>
      </div>

      <div class="compare-actions">
        <button class="btn btn-primary" id="btn-run-compare">Compare</button>
        <button class="btn btn-secondary" id="btn-back-compare">Back to Input</button>
      </div>

      <div class="compare-results" id="compare-results">
        <!-- Rendered by compare.js -->
      </div>
    </div>

    <!-- ===== Loading Overlay ===== -->
    <div class="loading-overlay" id="loading-overlay">
      <div class="spinner"></div>
      <div class="loading-text">Analyzing legislation...</div>
    </div>

    <!-- ===== Toast Container ===== -->
    <div class="toast-container" id="toast-container"></div>

  </div>

  <!-- Scripts (order matters: dependencies first) -->
  <script src="js/api.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/definitions.js"></script>
  <script src="js/compare.js"></script>
  <script src="js/renderer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
